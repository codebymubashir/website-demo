<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>


<style>
    h1 {
        background-color: aqua;
        position: sticky;
        top: 0%;
    }

    .parent {
        height: 100vh;
        display: flex;
        justify-content: center;
        position: relative;
    }


    .box5 {
        height: 30vh;
        width: 30%;
        background-color: rgb(11, 217, 11);
        position: absolute;
        top: 1rem;

    }



    .box {
        padding: 2rem 2rem;
        background-color: aqua;
        border-radius: 50%;
        position: relative;
        left: 4rem;
        z-index: 4;
    }


    .box:hover{
        background-color: blueviolet;
    }

    .box1 {
        padding: 2rem 2rem;
        background-color: rgb(26, 50, 50);
        border-radius: 50%;
        position: relative;
        left: 2rem;
        z-index: 3;

    }

    .box2 {
        padding: 2rem 2rem;
        background-color: rgb(0, 1, 0);
        border-radius: 50%;
        z-index: 2;

    }

    .box3 {
        padding: 22rem 22rem;
        background-color: aqua;
        border-radius: 20%;
        position: relative;
        right: 2rem;


    }



    swiper-container {
        width: 100%;
        height: 40vh;
    }

    swiper-slide {
        text-align: center;
        font-size: 18px;
        background: #444;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    swiper-slide img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
    }
</style>

<body>


    <h1>navbar</h1>
    <nav>
        <h1>logo</h1>
        bac
    </nav>
    <div class="parent">


        <div class="box5"></div>


        <div class="box"></div>
        <div class="box1"></div>
        <div class="box2"></div>
        <div class="box3"></div>
        <div class="box4"></div>

    </div>

    <h1>jhfuw</h1>


    <swiper-container class="mySwiper" pagination="true" pagination-clickable="true" slides-per-view="3"
        space-between="30" free-mode="true" autoplay="true">
        <swiper-slide>Slide 1 <img src="./media/1119f8e879b2e4cb46bd33155639a62530f9a579.png" alt=""> </swiper-slide>
        <swiper-slide>Slide 2</swiper-slide>
        <swiper-slide>Slide 3</swiper-slide>
        <swiper-slide>Slide 4</swiper-slide>
        <swiper-slide>Slide 5</swiper-slide>
        <swiper-slide>Slide 6</swiper-slide>
        <swiper-slide>Slide 7</swiper-slide>
        <swiper-slide>Slide 8</swiper-slide>
        <swiper-slide>Slide 9</swiper-slide>
    </swiper-container>




    <div class="parent"></div>
    <script src="https://cdn.jsdelivr.net/npm/swiper@14.0.1/swiper-element-bundle.min.js"></script>
















</body>

</html>
